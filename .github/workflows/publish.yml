name: Publish container image

# Triggers on semver tag push (vX.Y.Z, optionally with -beta./-rc.
# suffix). The tag drives both the version label and the published
# image tag. We push a multi-arch manifest list so a single tag (e.g.
# `:0.1.0` or `:latest`) resolves to the right arch automatically on
# the puller's host. amd64 builds natively, arm64 under QEMU emulation
# (fine for our small image — slow part is npm/tsc which is
# arch-independent).
#
# Tag glob is intentionally tight ('v[0-9]*.[0-9]*.[0-9]*') so stray
# tags like `vendor-fix` or `vnext` don't trigger a publish. Prerelease
# suffixes still match (the glob looks at the leading digits only).

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 0.1.0). For dispatch runs only."
        required: true
        type: string

jobs:
  # Image push runs first. The Release job below depends on it via
  # `needs: publish` so we never tag a Release whose corresponding image
  # didn't make it to the registry.
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/signalk-backup-server
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tags
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.tag }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Build the image tag list. Stable releases get :VERSION + :latest;
          # prereleases (containing -beta. or -rc.) get :VERSION only, so a
          # `v1.2.3-rc.1` push never overwrites the stable :latest pointer.
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          {
            echo 'tags<<EOF'
            echo "${IMAGE}:${VERSION}"
            if [[ "${VERSION}" != *-beta.* && "${VERSION}" != *-rc.* ]]; then
              echo "${IMAGE}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Publishing version: ${VERSION}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64 + arm64 manifest)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          provenance: false

  # GitHub Release with auto-generated notes (categorised via
  # .github/release.yml). Tag-triggered only — workflow_dispatch
  # publishes the image but does not create a Release (no tag context).
  # Gated on the publish job so a failed image push won't leave a
  # Release pointing at a missing image.
  release:
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
