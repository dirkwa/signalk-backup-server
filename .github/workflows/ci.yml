name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npx tsc

      - run: cd src/ui && npm ci
      - run: cd src/ui && npm run build

      - run: npm test

  build-image:
    # Build on every push/PR to catch Dockerfile regressions, but only push
    # on tag (handled by separate publish.yml).
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Build both arches but don't push — verifies the Dockerfile works.
      - name: Build (amd64 + arm64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: signalk-backup-server:ci
