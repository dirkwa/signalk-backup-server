version: 2
updates:
  # Server backend
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # @types/node major versions track the Node.js major. Pin to the
      # lowest supported runtime (Node 22 per package.json engines) so
      # types reflect what's actually available on every supported version.
      # Allow updates within the v22.x line; ignore v23+.
      - dependency-name: "@types/node"
        versions: [">=23"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        update-types:
          - minor
          - patch

  # Dockerfile FROM image tags only — Dependabot's docker ecosystem
  # updates `FROM <image>:<tag>` references (so the wolfi-base bumps
  # come through). It does NOT update packages installed via `RUN apk
  # add ...`; kopia/rclone are pinned via ARG and need manual bumps.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
